name: CI

on: # Evento que desencadena la acción
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest # Sistema operativo en el que se ejecutará la acción
    steps: # Pasos a seguir en la acción
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas
        run: pytest
      
      - name: Avisar a Slack si la build falla
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "*La build falló y el despliegue fue bloqueado*\n\n*Proyecto:* ${{ github.repository }}\n*Rama:* ${{ github.ref_name }}\n*Disparado por:* ${{ github.actor }}\n\nUna prueba automática no pasó, así que el pipeline detuvo el despliegue. La aplicación en producción sigue funcionando con la última versión correcta; el cambio con error no llegó a publicarse.\n\n*Ver el detalle del error:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }' ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Avisar a Slack si la build pasa
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "*La build pasó correctamente*\n\n*Proyecto:* ${{ github.repository }}\n*Rama:* ${{ github.ref_name }}\n*Disparado por:* ${{ github.actor }}\n\nTodas las pruebas pasaron. Si el cambio fue a la rama principal, se desplegará a producción automáticamente.\n\n*Ver la app:* https://lab-ic-ec.onrender.com"
          }' ${{ secrets.SLACK_WEBHOOK_URL }}