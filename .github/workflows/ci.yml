name: CI

on: # Evento que desencadena la acción
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest # Sistema operativo en el que se ejecutará la acción
    steps: # Pasos a seguir en la acción
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas
        run: pytest

      - name: Avisar a Slack si falla en un Pull Request
        if: failure() && github.event_name == 'pull_request'
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "*La build falló en el Pull Request*\n\n*Proyecto:* ${{ github.repository }}\n*Rama:* ${{ github.head_ref }}\n*Disparado por:* ${{ github.actor }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n\nUna prueba automática no pasó en este Pull Request. El código todavía no está listo para integrarse a main; conviene revisarlo y corregirlo antes de hacer el merge.\n\n*Ver el detalle del error:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }' ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Avisar a Slack si falla en main
        if: failure() && github.event_name == 'push'
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "*La build falló en main y no se desplegó*\n\n*Proyecto:* ${{ github.repository }}\n*Rama:* ${{ github.ref_name }}\n*Disparado por:* ${{ github.actor }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n\nUna prueba automática no pasó. Como el despliegue está configurado para ejecutarse solo si las pruebas pasan, este cambio no se desplegó. La aplicación en producción sigue funcionando con la última versión correcta.\n\n*Ver el detalle del error:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }' ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Avisar a Slack si la build pasa en main
        if: success() && github.event_name == 'push'
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "*La build pasó correctamente*\n\n*Proyecto:* ${{ github.repository }}\n*Rama:* ${{ github.ref_name }}\n*Disparado por:* ${{ github.actor }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n\nTodas las pruebas pasaron y el cambio se está desplegando a producción automáticamente.\n\n*Ver la app:* https://lab-ic-ec-docker.onrender.com"
          }' ${{ secrets.SLACK_WEBHOOK_URL }}